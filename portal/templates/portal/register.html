<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASOP Portal - Student Registration</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0f172a; display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; }
        
        /* Premium Golden-Accented Input Card Configuration Layout */
        .card { max-width: 520px; width: 100%; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); overflow: hidden; border-top: 4px solid #c5a059; }
        .card-body { padding: 40px 35px; }
        .card-title { color: #0f172a; font-size: 24px; font-weight: 700; margin-bottom: 6px; text-align: center; }
        .card-subtitle { color: #64748b; font-size: 14px; text-align: center; margin-bottom: 28px; }
        
        /* Input Form Assemblies styling */
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 14px; color: #1e293b; font-weight: 600; margin-bottom: 8px; }
        .form-control, .form-select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; color: #334155; background: #ffffff; font-size: 14px; outline: none; }
        .form-control:focus, .form-select:focus { border-color: #c5a059; }
        
        /* Custom Button & Accent Components */
        .btn { width: 100%; padding: 14px; background-color: #c5a059; color: #ffffff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background-color 0.15s; }
        .btn:hover { background-color: #b38f4b; }
        .alert { padding: 12px; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; border-radius: 6px; margin-bottom: 20px; font-size: 13.5px; font-weight: 500; }
        .footer-text { margin-top: 24px; text-align: center; font-size: 13.5px; color: #64748b; }
        .footer-text a { color: #c5a059; text-decoration: none; font-weight: 600; margin-left: 4px; }
    </style>
</head>
<body>

    <!-- Main View Panel Card Container -->
    <main class="card">
        <div class="card-body">
            <div style="text-align: center;">
                <h2 class="card-title">Create Portal Profile</h2>
                <p class="card-subtitle">Join Lagos School of Programming portal network</p>
            </div>

            <!-- SYSTEM FEEDBACK CONTAINER -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <!-- Production Data Transfer Form Pipeline -->
            <form action="{% url 'portal_register' %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" class="form-control" placeholder="Enter your first name" required />
                </div>

                <div class="form-group">
                    <label>Surname</label>
                    <input type="text" name="last_name" class="form-control" placeholder="Enter your surname" required />
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" placeholder="e.g., kofi_codes" required />
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="e.g., student@gmail.com" required />
                </div>

                <div class="form-group">
                    <label>Password Secret</label>
                    <input type="password" name="password" class="form-control" placeholder="Choose a secure password" minlength="8" required />
                </div>

                <div class="form-group">
                    <label>Choose Program Track</label>
                    <select name="program_track" class="form-select">
                        <option value="fullstack">Fullstack Development</option>
                        <option value="data_science">Data Science & Analytics</option>
                        <option value="cybersecurity">Cybersecurity Architecture</option>
                    </select>
                </div>

                <!-- Integrated Biometric Passport Enrollment Slot -->
                <div class="form-group" style="margin-bottom: 28px;">
                    <label>📷 Face ID Baseline Passport Enrollment</label>
                    <input type="file" name="biometric_photo" accept="image/*" capture="user" class="form-control" required />
                </div>

                <button type="submit" class="btn">Provision Account</button>
            </form>

            <div class="footer-text">
                <span>Already possess an institutional account?</span> 
                <a href="{% url 'portal_login' %}">Sign In Instead</a>
            </div>
        </div>
    </main>

</body>
</html>
